}

gap: 6px;

<script>  
let startTime = Date.now();  
let totalTime = 0;  
const questions = [  
{ q: "稳定性最好的结构是？", options: ["三角形", "长方形", "平行四边形", "梯形"], answer: "A", explanation: "三角形最稳定，不易变形。", detail: "三角形具有稳定性，广泛应用于桥梁桁架、塔吊支架、自行车车架等工程结构中，确保整体坚固不变形。" },  
{ q: "杠杆绕着转动的固定点叫？", options: ["支点", "动力点", "阻力点", "作用点"], answer: "A", explanation: "杠杆的固定转动点叫支点。", detail: "支点是杠杆工作的核心，例如跷跷板的中间轴、剪刀的铆钉都是支点，决定了杠杆的类型和效果。" },  
{ q: "下列属于省力杠杆的是？", options: ["镊子", "钓鱼竿", "羊角锤", "筷子"], answer: "C", explanation: "羊角锤动力臂长，是省力杠杆。", detail: "羊角锤拔钉时，手握处到支点的距离（动力臂）远大于钉子到支点的距离（阻力臂），因此省力但费距离。" },  
{ q: "下列属于费力杠杆的是？", options: ["扳手", "镊子", "核桃夹", "门把手"], answer: "B", explanation: "镊子动力臂短，是费力杠杆，省距离。", detail: "镊子尖端移动很小距离，手指需张开较大距离，虽然费力但能精确控制夹取动作，适用于精细操作。" },  
{ q: "等臂杠杆的例子是？", options: ["天平", "剪刀", "起子", "撬棍"], answer: "A", explanation: "天平两臂长度相等，是等臂杠杆。", detail: "天平利用等臂杠杆原理，当两边质量相等时平衡，是实验室和生活中测量质量的基本工具。" },  
{ q: "定滑轮的作用是？", options: ["省力", "改变力的方向", "既省力又改方向", "省距离"], answer: "B", explanation: "定滑轮不省力，只改变力的方向。", detail: "定滑轮虽不省力，但能让人站在地面升旗或提升重物，极大提升操作的安全性和便利性。" },  
{ q: "动滑轮的特点是？", options: ["省一半力", "改变方向", "不省力", "费一半力"], answer: "A", explanation: "动滑轮能省一半力，但不改变方向。", detail: "动滑轮实质是动力臂为阻力臂二倍的杠杆，可省一半力，常用于建筑工地提升重物以减轻人力负担。" },  
{ q: "滑轮组的特点是？", options: ["既省力又改方向", "只省力不改方向", "只改方向不省力", "都不"], answer: "A", explanation: "滑轮组结合定、动滑轮，既省力又改变方向。", detail: "起重机、升降机等设备都采用滑轮组，通过组合实现大力省力且操作方向灵活，是复杂机械的核心部件。" },  
{ q: "两个平行啮合的齿轮转动方向？", options: ["相同", "相反", "不动", "随机"], answer: "B", explanation: "平行啮合的两个齿轮转动方向相反。", detail: "齿轮啮合时齿相互推动，导致相邻齿轮反向旋转，这一特性被用于需要反转输出的机械传动系统中。" },  
{ q: "大齿轮带动小齿轮，会？", options: ["加速", "减速", "匀速", "停止"], answer: "A", explanation: "大带小，速度变快，是加速。", detail: "大齿轮转一圈，小齿轮要转多圈，因此输出轴转速提高，常用于需要高速输出的场景如电动玩具车。" },  
{ q: "小齿轮带动大齿轮，会？", options: ["加速", "减速", "匀速", "停止"], answer: "B", explanation: "小带大，速度变慢，是减速。", detail: "小齿轮转多圈，大齿轮才转一圈，输出转速降低但扭矩增大，适用于需要大力矩的场合如汽车变速箱低档位。" },  
{ q: "斜面的作用是？", options: ["省力费距离", "费力省距离", "不省力", "只改方向"], answer: "A", explanation: "斜面省力，但费距离。", detail: "盘山公路、螺丝钉、斧头都是斜面的应用，通过增加移动距离来减小所需的作用力，符合功的原理。" },  
{ q: "螺旋是哪种简单机械的变形？", options: ["杠杆", "斜面", "滑轮", "轮轴"], answer: "B", explanation: "螺旋是斜面的变形。", detail: "将斜面缠绕在圆柱体上就形成了螺旋，螺丝钉、螺栓、瓶盖都利用螺旋原理实现紧固或提升功能。" },  
{ q: "轮轴的实质是？", options: ["连续旋转的杠杆", "斜面", "滑轮", "齿轮"], answer: "A", explanation: "轮轴是可以连续转动的杠杆。", detail: "方向盘、门把手、水龙头都是轮轴，大轮（轮）带动小轴（轴）转动，可省力或改变力的作用效果。" },  
{ q: "下列应用三角形稳定性的是？", options: ["伸缩门", "起重机支架", "折叠椅", "推拉窗"], answer: "B", explanation: "起重机支架用三角形结构，保证稳定。", detail: "起重机工作时承受巨大载荷，三角形支架能有效分散应力，防止结构扭曲或倒塌，保障作业安全。" },  
{ q: "平行四边形的特点是？", options: ["稳定", "易变形", "坚固", "耐压"], answer: "B", explanation: "平行四边形容易变形，可做伸缩结构。", detail: "伸缩门、可折叠衣架利用平行四边形的不稳定性实现伸缩功能，通过添加对角线支撑可增强其刚性。" },  
{ q: "力的三要素不包括？", options: ["大小", "方向", "作用点", "时间"], answer: "D", explanation: "力的三要素：大小、方向、作用点，不含时间。", detail: "只有同时确定这三个要素，才能完整描述一个力的效果。例如推门时，手的位置（作用点）不同，开门难易程度完全不同。" },  
{ q: "重力的方向是？", options: ["竖直向上", "竖直向下", "水平向左", "水平向右"], answer: "B", explanation: "重力方向永远竖直向下。", detail: "无论你在地球哪个位置，重力方向都指向地心。这也是为什么水总是往低处流，建筑必须垂直建造。" },  
{ q: "摩擦力的作用是？", options: ["推动物体", "阻碍相对运动", "提升物体", "旋转物体"], answer: "B", explanation: "摩擦力阻碍物体相对运动。", detail: "没有摩擦力，人无法行走，车辆无法启动或刹车。但过大的摩擦也会导致机器零件磨损和能量损耗。" },  
{ q: "滚动摩擦与滑动摩擦相比？", options: ["更大", "更小", "相等", "不确定"], answer: "B", explanation: "滚动摩擦力远小于滑动摩擦力。", detail: "这也是为什么行李箱装轮子后更容易拉动。机器人轮式底盘比履带更节能，轴承内滚珠显著减少摩擦。" },  
{ q: "齿轮传动的优点是？", options: ["传动准确", "会打滑", "远距离传动", "噪音小"], answer: "A", explanation: "齿轮传动精准、不打滑、力量大。", detail: "齿轮啮合传动比恒定，适用于需要精确同步的场合如钟表、机器人关节，但不适合远距离传动。" },  
{ q: "皮带传动的优点是？", options: ["噪音小", "准确", "传动力大", "不易坏"], answer: "A", explanation: "皮带传动噪音小、可远距离传动。", detail: "皮带具有弹性，能缓冲振动、吸收冲击，常用于发动机与附件之间的传动，但可能因打滑导致传动比不精确。" },  
{ q: "链传动的特点是？", options: ["同向转动", "反向转动", "会打滑", "近距离传动"], answer: "A", explanation: "链条传动两轮转动方向相同。", detail: "自行车就是典型的链传动，链条连接前后链轮，保证两者同向转动，且不会打滑，适合中等距离传动。" },  
{ q: "下列哪项是简单机械？", options: ["电脑", "手机", "杠杆", "电池"], answer: "C", explanation: "杠杆是六大简单机械之一。", detail: "六大简单机械包括杠杆、滑轮、轮轴、斜面、楔形和螺旋，它们是所有复杂机械的基础构件。" },

let currentQuestion = 0;  
let userAnswers = new Array(questions.length).fill(null);  
let correctCount = 0;  
let isSubmittedAll = false;  

const questionText = document.getElementById('questionText');  
const optionsContainer = document.getElementById('options');  
const explanationEl = document.getElementById('explanation');  
const progressEl = document.getElementById('progress');  
const submitBtn = document.getElementById('submitBtn');  
const prevBtn = document.getElementById('prevBtn');  
const nextBtn = document.getElementById('nextBtn');  
const answeredCountEl = document.getElementById('answeredCount');  
const correctCountEl = document.getElementById('correctCount');  
const accuracyEl = document.getElementById('accuracy');  
const summaryCard = document.getElementById('summaryCard');  
const totalTimeEl = document.getElementById('totalTime');  
const finalCorrectEl = document.getElementById('finalCorrect');  
const finalAccuracyEl = document.getElementById('finalAccuracy');  
const submitAllBtn = document.getElementById('submitAllBtn');  
const restartBtn = document.getElementById('restartBtn');  
const restartFromSummary = document.getElementById('restartFromSummary');  
const bottomNav = document.getElementById('bottomNav');  
const navScroll = document.getElementById('navScroll');  
const modalOverlay = document.getElementById('modalOverlay');  

function showModal(message) {  
document.getElementById('modalMessage').textContent = message;  
modalOverlay.classList.add('show');  
}  

function closeModal() {  
modalOverlay.classList.remove('show');  
}  

// 点击遮罩关闭  
modalOverlay.addEventListener('click', (e) => {  
if (e.target === modalOverlay) {  
closeModal();  
}  
});  

function updateStats() {  
const answered = userAnswers.filter(a => a !== null).length;  
answeredCountEl.textContent = answered;  
correctCount = 0;  
for (let i = 0; i < questions.length; i++) {  
if (userAnswers[i] && userAnswers[i] === questions[i].answer) {  
correctCount++;  
}  
}  
correctCountEl.textContent = correctCount;  
const accuracy = answered > 0 ? Math.round((correctCount / answered) * 100) : 0;  
accuracyEl.textContent = accuracy;  
}  

function renderQuestion() {  
// ✅ 移除了 if (isSubmittedAll) return;  
const q = questions[currentQuestion];  
questionText.innerHTML = `<strong>${currentQuestion + 1}.</strong> ${q.q}`;  
optionsContainer.innerHTML = '';  
explanationEl.classList.remove('show');  
explanationEl.innerHTML = '';  

const optionLabels = ['A', 'B', 'C', 'D'];  
q.options.forEach((opt, index) => {  
const div = document.createElement('div');  
div.className = 'option';  
div.dataset.index = index;  
div.dataset.label = optionLabels[index];  
div.textContent = `${optionLabels[index]}. ${opt}`;  

// 显示用户原答案（即使已提交）  
if (userAnswers[currentQuestion] === optionLabels[index]) {  
div.classList.add('selected');  
}  

// ✅ 只有在未提交时才允许选择  
if (!isSubmittedAll) {  
div.addEventListener('click', () => {  
document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));  
div.classList.add('selected');  
userAnswers[currentQuestion] = optionLabels[index];  
});  
} else {  
// 提交后禁止交互  
div.style.pointerEvents = 'none';  
div.style.opacity = '0.9';  
}  

optionsContainer.appendChild(div);  
});  

progressEl.textContent = `第 ${currentQuestion + 1} 题 / 共 ${questions.length} 题`;  

// 控制按钮状态  
if (isSubmittedAll) {  
prevBtn.disabled = true;  
nextBtn.disabled = true;  
submitBtn.disabled = true;  
} else {  
prevBtn.disabled = currentQuestion === 0;  
nextBtn.disabled = false;  
submitBtn.disabled = false;  
}  

updateStats();  

// 如果已提交，立即显示该题解析  
if (isSubmittedAll) {  
showResultForIndex(currentQuestion);  
}  
}  

// ==================== 新增：独立显示某题解析 ====================  
function showResultForIndex(index) {  
const correctAnswer = questions[index].answer;  
const userAnswer = userAnswers[index];  

// 清除旧状态  
const allOptions = optionsContainer.querySelectorAll('.option');  
allOptions.forEach(opt => {  
opt.classList.remove('correct', 'incorrect');  
});  

// 标记正确/错误  
allOptions.forEach(opt => {  
const label = opt.dataset.label;  
if (label === correctAnswer) {  
opt.classList.add('correct');  
} else if (label === userAnswer && userAnswer !== correctAnswer) {  
opt.classList.add('incorrect');  
}  
});  

// 构建解析内容  
let explanationHTML = `  
${userAnswer === correctAnswer ? '✔正确！' : '❌错误！正确答案是 ' + correctAnswer}  
<br><strong>解析：</strong>${questions[index].explanation}  
`;  

if (questions[index].detail) {  
explanationHTML += `<div class="extension"><strong>🔍 拓展知识：</strong>${questions[index].detail}</div>`;  
}  

explanationEl.innerHTML = explanationHTML;  
explanationEl.classList.add('show');  
}  

function showResult(forCurrentOnly = true) {  
if (forCurrentOnly) {  
showResultForIndex(currentQuestion);  
}  
}  

function finishQuiz() {  
totalTime = Date.now() - startTime;  
const totalSeconds = Math.floor(totalTime / 1000);  
const minutes = Math.floor(totalSeconds / 60);  
const seconds = totalSeconds % 60;  
totalTimeEl.textContent = `${minutes}分${seconds}秒`;  
finalCorrectEl.textContent = correctCount;  
finalAccuracyEl.textContent = Math.round((correctCount / questions.length) * 100);  
summaryCard.classList.add('show');  
}  

function renderBottomNav() {  
navScroll.innerHTML = '';  
for (let i = 0; i < questions.length; i++) {  
const btn = document.createElement('button');  
btn.textContent = i + 1;  
btn.className = 'nav-btn';  
btn.dataset.index = i;  

const userAns = userAnswers[i];  
const correctAns = questions[i].answer;  

if (userAns === null) {  
btn.style.backgroundColor = '#cbd5e1';  
btn.title = `第${i+1}题：未作答`;  
} else if (userAns === correctAns) {  
btn.style.backgroundColor = '#22c55e';  
btn.title = `第${i+1}题：回答正确`;  
} else {  
btn.style.backgroundColor = '#ef4444';  
btn.title = `第${i+1}题：回答错误`;  
}  

btn.addEventListener('click', () => {  
currentQuestion = i;  
renderQuestion(); // 现在可以正常渲染！  
// 滚动到题目  
setTimeout(() => {  
document.querySelector('.question-container')?.scrollIntoView({  
behavior: 'smooth',  
block: 'center'  
});  
}, 100);  
});  

navScroll.appendChild(btn);  
}  
bottomNav.style.display = 'block';  
}  

function submitAllAnswers() {  
isSubmittedAll = true;  
currentQuestion = questions.length - 1;  
renderQuestion();  
finishQuiz();  
renderBottomNav();  
}  

function restartQuiz() {  
userAnswers = new Array(questions.length).fill(null);  
currentQuestion = 0;  
correctCount = 0;  
isSubmittedAll = false;  
startTime = Date.now();  
summaryCard.classList.remove('show');  
bottomNav.style.display = 'none';  
renderQuestion();  
}  

submitBtn.addEventListener('click', () => {  
if (userAnswers[currentQuestion]) {  
showResult(true);  
} else {  
showModal('请先选择一个答案！');  
}  
});  

prevBtn.addEventListener('click', () => {  
if (currentQuestion > 0 && !isSubmittedAll) {  
currentQuestion--;  
renderQuestion();  
submitBtn.disabled = false;  
summaryCard.classList.remove('show');  
}  
});  

nextBtn.addEventListener('click', () => {  
if (isSubmittedAll) return;  
if (userAnswers[currentQuestion] === null) {  
showModal('请先选择答案再进入下一题！');  
return;  
}  
if (currentQuestion < questions.length - 1) {  
currentQuestion++;  
renderQuestion();  
submitBtn.disabled = false;  
summaryCard.classList.remove('show');  
}  
});  

submitAllBtn.addEventListener('click', submitAllAnswers);  
restartBtn.addEventListener('click', restartQuiz);  
restartFromSummary.addEventListener('click', restartQuiz);  

// 初始化  
renderQuestion();  
</script>  
</body>
</html>
