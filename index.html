let currentQuestion = 0;

const explanationEl = document.getElementById('explanation');  
const progressEl = document.getElementById('progress');

const nextBtn = document.getElementById('nextBtn');

const correctCountEl = document.getElementById('correctCount');  
const accuracyEl = document.getElementById('accuracy');  
const summaryCard = document.getElementById('summaryCard');  
const totalTimeEl = document.getElementById('totalTime');  
const finalCorrectEl = document.getElementById('finalCorrect');  
const finalAccuracyEl = document.getElementById('finalAccuracy');  
const submitAllBtn = document.getElementById('submitAllBtn');  
const restartBtn = document.getElementById('restartBtn');  
const restartFromSummary = document.getElementById('restartFromSummary');  
const bottomNav = document.getElementById('bottomNav');
const navScroll = document.getElementById('navScroll');
const modalOverlay = document.getElementById('modalOverlay');
function showModal(message) {
  document.getElementById('modalMessage').textContent = message;
  modalOverlay.classList.add('show');
}
function closeModal() {
  modalOverlay.classList.remove('show');
}
// 点击遮罩关闭
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) {
    closeModal();
  }
});
function updateStats() {  
const answered = userAnswers.filter(a => a !== null).length;  
answeredCountEl.textContent = answered;  
correctCount = 0;  
for (let i = 0; i < questions.length; i++) {  
if (userAnswers[i] && userAnswers[i] === questions[i].answer) {  
correctCount++;  
}  
}  
correctCountEl.textContent = correctCount;  
const accuracy = answered > 0 ? Math.round((correctCount / answered) * 100) : 0;  
accuracyEl.textContent = accuracy;  
}  
function renderQuestion() {  
  // ✅ 移除了 if (isSubmittedAll) return;
  const q = questions[currentQuestion];  
  questionText.innerHTML = `<strong>${currentQuestion + 1}.</strong> ${q.q}`;  
  optionsContainer.innerHTML = '';  
  explanationEl.classList.remove('show');  
  explanationEl.innerHTML = '';  
  const optionLabels = ['A', 'B', 'C', 'D'];  
  q.options.forEach((opt, index) => {  
    const div = document.createElement('div');  
    div.className = 'option';  
    div.dataset.index = index;  
    div.dataset.label = optionLabels[index];  
    div.innerHTML = `${optionLabels[index]}. ${opt}`;  
    // 显示用户原答案（即使已提交）
    if (userAnswers[currentQuestion] && userAnswers[currentQuestion].includes(optionLabels[index])) {  
      div.classList.add('selected');  
    }  
    // ✅ 只有在未提交时才允许选择
    if (!isSubmittedAll) {
      div.addEventListener('click', () => {  
        // 处理多选题
        if (q.answer.length > 1) {
          if (div.classList.contains('selected')) {
            div.classList.remove('selected');
            userAnswers[currentQuestion] = userAnswers[currentQuestion].replace(optionLabels[index], '');
          } else {
            div.classList.add('selected');
            userAnswers[currentQuestion] = (userAnswers[currentQuestion] || '') + optionLabels[index];
          }
        } else {
          // 单选题
          document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));  
          div.classList.add('selected');  
          userAnswers[currentQuestion] = optionLabels[index];  
        }
      });  
    } else {
      // 提交后禁止交互
      div.style.pointerEvents = 'none';
      div.style.opacity = '0.9';
    }
    optionsContainer.appendChild(div);  
  });  
  progressEl.textContent = `第 ${currentQuestion + 1} 题 / 共 ${questions.length} 题`;  
  // 控制按钮状态
  if (isSubmittedAll) {
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    submitBtn.disabled = true;
  } else {
    prevBtn.disabled = currentQuestion === 0;
    nextBtn.disabled = false;
    submitBtn.disabled = false;
  }
  updateStats();  
  // 如果已提交，立即显示该题解析
  if (isSubmittedAll) {
    showResultForIndex(currentQuestion);
  }
}

  const correctAnswer = questions[index].answer;
  const userAnswer = userAnswers[index] || '';
  
  // 清除旧状态
  const allOptions = optionsContainer.querySelectorAll('.option');
  allOptions.forEach(opt => {
    opt.classList.remove('correct', 'incorrect');
  });
  // 标记正确/错误
  allOptions.forEach(opt => {
    const label = opt.dataset.label;
    if (correctAnswer.includes(label)) {
      opt.classList.add('correct');
    } else if (userAnswer.includes(label) && !correctAnswer.includes(label)) {
      opt.classList.add('incorrect');
    }
  });
  // 构建解析内容
  const isCorrect = userAnswer === correctAnswer;
  let explanationHTML = `  
     ${isCorrect ? '✔正确！' : '❌错误！正确答案是 ' + correctAnswer}  
    <br><strong>解析：</strong>${questions[index].explanation}  
  `;  
  if (questions[index].detail) {  
    explanationHTML += `<div class="extension"><strong>🔍 拓展知识：</strong>${questions[index].detail}</div>`;  
  }  
  explanationEl.innerHTML = explanationHTML;
  explanationEl.classList.add('show');
}
function showResult(forCurrentOnly = true) {  
  if (forCurrentOnly) {
    showResultForIndex(currentQuestion);
  }
}  
function finishQuiz() {  
totalTime = Date.now() - startTime;  
const totalSeconds = Math.floor(totalTime / 1000);  
const minutes = Math.floor(totalSeconds / 60);  
const seconds = totalSeconds % 60;  
totalTimeEl.textContent = `${minutes}分${seconds}秒`;  
finalCorrectEl.textContent = correctCount;  
finalAccuracyEl.textContent = Math.round((correctCount / questions.length) * 100);  
summaryCard.classList.add('show');  
}  
function renderBottomNav() {
  navScroll.innerHTML = '';
  
  for (let i = 0; i < questions.length; i++) {
    const btn = document.createElement('button');
    btn.textContent = i + 1;
    btn.className = 'nav-btn';
    btn.dataset.index = i;
    const userAns = userAnswers[i] || '';
    const correctAns = questions[i].answer;
    if (userAns === '') {
      btn.style.backgroundColor = '#cbd5e1';
      btn.title = `第${i+1}题：未作答`;
    } else if (userAns === correctAns) {
      btn.style.backgroundColor = '#22c55e';
      btn.title = `第${i+1}题：回答正确`;
    } else {
      btn.style.backgroundColor = '#ef4444';
      btn.title = `第${i+1}题：回答错误`;
    }
    btn.addEventListener('click', () => {
      currentQuestion = i;
      renderQuestion(); // 现在可以正常渲染！
      // 滚动到题目
      setTimeout(() => {
        document.querySelector('.question-container')?.scrollIntoView({ 
          behavior: 'smooth', 
          block: 'center' 
        });
      }, 100);
    });
    navScroll.appendChild(btn);
  }
  bottomNav.style.display = 'block';
}
function submitAllAnswers() {  
isSubmittedAll = true;  
currentQuestion = questions.length - 1;  
renderQuestion();  
finishQuiz();  
renderBottomNav();  
}  
function restartQuiz() {  
userAnswers = new Array(questions.length).fill(null);  
currentQuestion = 0;  
correctCount = 0;  
isSubmittedAll = false;  
startTime = Date.now();  
summaryCard.classList.remove('show');  
bottomNav.style.display = 'none';
renderQuestion();  
}  
submitBtn.addEventListener('click', () => {  
if (userAnswers[currentQuestion]) {  
showResult(true);  
} else {  
showModal('请先选择一个答案！');  
}  
});  
prevBtn.addEventListener('click', () => {  
if (currentQuestion > 0 && !isSubmittedAll) {  
currentQuestion--;  
renderQuestion();  
submitBtn.disabled = false;  
summaryCard.classList.remove('show');  
}  
});  
nextBtn.addEventListener('click', () => {  
if (isSubmittedAll) return;  
if (userAnswers[currentQuestion] === null) {  
showModal('请先选择答案再进入下一题！');  
return;  
}  
if (currentQuestion < questions.length - 1) {  
currentQuestion++;  
renderQuestion();  
submitBtn.disabled = false;  
summaryCard.classList.remove('show');  
}  
});  
submitAllBtn.addEventListener('click', submitAllAnswers);  
restartBtn.addEventListener('click', restartQuiz);  
restartFromSummary.addEventListener('click', restartQuiz);  
// 初始化  
renderQuestion();  
</script>  
  
</body></html>
